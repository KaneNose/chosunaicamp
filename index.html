<head>
  <meta charset="UTF-8" />

  <title>조선대 플러스+</title>
  <style>
    :root {
      --main-blue: #005bac;
      --dark-blue: #003f7d;
      --light-blue: #eaf4ff;
      --very-light-blue: #f5f9ff;
      --white: #ffffff;
      --text: #1f2937;
      --gray: #6b7280;
      --border: #d7e3f3;
      --shadow: rgba(0, 59, 120, 0.13);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, #f3f7fc 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .chatbot-wrapper {
      width: 100%;
      max-width: 980px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 14px 35px var(--shadow);
    }
    .header {
      background: var(--main-blue);
      color: var(--white);
      text-align: center;
      padding: 34px 20px;
    }
    .header h1 {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 14px;
    }
    .header p {
      font-size: 18px;
      font-weight: 700;
      opacity: 0.95;
      line-height: 1.55;
    }
    .quick-guide {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 18px 20px;
      background: var(--very-light-blue);
      border-bottom: 1px solid var(--border);
    }
    .guide-chip {
      border: 1px solid #b8d5f4;
      background: var(--white);
      color: var(--main-blue);
      border-radius: 999px;
      padding: 10px 15px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }
    .guide-chip:hover { background: var(--light-blue); transform: translateY(-1px); }
    .chat-window {
      height: 500px;
      overflow-y: auto;
      padding: 22px;
      background: var(--white);
      scroll-behavior: smooth;
    }
    .message-row { display: flex; margin-bottom: 15px; }
    .message-row.user { justify-content: flex-end; }
    .message-row.bot { justify-content: flex-start; }
    .message {
      max-width: 80%;
      padding: 13px 15px;
      border-radius: 16px;
      line-height: 1.62;
      font-size: 15px;
      word-break: keep-all;
      white-space: pre-line;
    }
    .message.user {
      background: var(--main-blue);
      color: var(--white);
      border-bottom-right-radius: 5px;
    }
    .message.bot {
      background: var(--light-blue);
      color: var(--text);
      border: 1px solid #cfe4fb;
      border-bottom-left-radius: 5px;
    }
    .input-area {
      display: flex;
      gap: 10px;
      padding: 18px;
      background: var(--very-light-blue);
      border-top: 1px solid var(--border);
    }
    #userInput {
      flex: 1;
      border: 1px solid #b9cde6;
      border-radius: 14px;
      padding: 14px 15px;
      font-size: 15px;
      outline: none;
      background: var(--white);
      transition: 0.2s;
    }
    #userInput:focus {
      border-color: var(--main-blue);
      box-shadow: 0 0 0 3px rgba(0, 91, 172, 0.13);
    }
    #sendButton {
      border: none;
      border-radius: 14px;
      padding: 0 24px;
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      background: var(--main-blue);
      cursor: pointer;
      white-space: nowrap;
      transition: 0.2s;
    }
    #sendButton:hover { background: var(--dark-blue); transform: translateY(-1px); }
    .notice {
      padding: 12px 18px 18px;
      color: var(--gray);
      font-size: 12px;
      background: var(--very-light-blue);
      line-height: 1.6;
    }
    @media (max-width: 640px) {
      body { padding: 12px; align-items: flex-start; }
      .chatbot-wrapper { border-radius: 16px; }
      .header { padding: 24px 16px; }
      .header h1 { font-size: 28px; }
      .header p { font-size: 14px; }
      .chat-window { height: 62vh; padding: 16px; }
      .message { max-width: 90%; font-size: 14px; }
      .input-area { flex-direction: column; }
      #sendButton { width: 100%; padding: 13px 0; }
    }
  </style>
</head>

학사일정 또는 기숙사 식단을 질문해 주세요.

- 중간고사 언제야?
- 개강일 알려줘
- 5월 22일 중식
- 어제 식단
- 지난주 저녁</div>
      </div>
    </section>

    <section class="input-area">
      <input id="userInput" type="text" placeholder="질문을 입력하세요. 예: 어제 식단" autocomplete="off" />
      <button id="sendButton" type="button">전송</button>
    </section>

    <p class="notice">
      ※ 이 챗봇은 파일 내부에 저장된 학사일정/식단 데이터를 기준으로 답변합니다. 실제 서비스에 사용할 때는 조선대학교 공식 홈페이지의 최신 자료를 확인한 뒤 데이터를 수정해 주세요.
    </p>
  </main>

      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatYMDToKorean(ymd) {
      const [year, month, day] = ymd.split("-");
      return `${year}년 ${Number(month)}월 ${Number(day)}일`;
    }

    function formatAcademicDate(schedule) {
      const start = formatYMDToKorean(schedule.startDate);
      return schedule.endDate ? `${start} ~ ${formatYMDToKorean(schedule.endDate)}` : start;
    }

    function cloneDate(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function koreanNumberToValue(word) {
      const numberMap = {
        "하루": 1, "하룻": 1, "한": 1, "일": 1, "하나": 1, "첫": 1,
        "이틀": 2, "이": 2, "두": 2, "둘": 2,
        "사흘": 3, "삼": 3, "세": 3, "셋": 3,
        "나흘": 4, "사": 4, "네": 4, "넷": 4,
        "닷새": 5, "닷세": 5, "오": 5, "다섯": 5,
        "엿새": 6, "엿세": 6, "육": 6, "여섯": 6,
        "이레": 7, "칠": 7, "일곱": 7,
        "여드레": 8, "팔": 8, "여덟": 8,
        "아흐레": 9, "구": 9, "아홉": 9,
        "열흘": 10, "열": 10, "십": 10,
        "일주일": 7, "한주": 7, "한주일": 7, "두주": 14, "두주일": 14,
        "보름": 15, "반달": 15
      };
      if (/^[0-9]+$/.test(word)) return Number(word);
      return numberMap[word] || null;
    }

    function extractDateFromQuestion(question) {
      const today = new Date();
      const normalized = normalizeText(question);

      const fullDateMatch = question.match(/([0-9]{4})[-.년 ]*([0-9]{1,2})[-.월 ]*([0-9]{1,2})/);
      if (fullDateMatch) {
        return formatDateToYMD(new Date(Number(fullDateMatch[1]), Number(fullDateMatch[2]) - 1, Number(fullDateMatch[3])));
      }

      const monthDayMatch = question.match(/([0-9]{1,2})\s*월\s*([0-9]{1,2})\s*일/);
      if (monthDayMatch) {
        return formatDateToYMD(new Date(today.getFullYear(), Number(monthDayMatch[1]) - 1, Number(monthDayMatch[2])));
      }

      const fixedRelativeWords = [
        { words: ["오늘", "금일"], days: 0 },
        { words: ["어제", "작일"], days: -1 },
        { words: ["그제", "그저께", "엊그제", "엊그저께", "엊그제네"], days: -2 },
        { words: ["그끄제", "그끄저께"], days: -3 },
        { words: ["내일", "명일"], days: 1 },
        { words: ["모레", "내일모레"], days: 2 },
        { words: ["글피"], days: 3 },
        { words: ["그글피"], days: 4 }
      ];

      for (const item of fixedRelativeWords) {
        if (item.words.some((word) => normalized.includes(word))) {
          const targetDate = cloneDate(today);
          targetDate.setDate(targetDate.getDate() + item.days);
          return formatDateToYMD(targetDate);
        }
      }

      if (normalized.includes("지난주") || normalized.includes("저번주") || normalized.includes("전주")) {
        const targetDate = cloneDate(today);
        targetDate.setDate(targetDate.getDate() - 7);
        return formatDateToYMD(targetDate);
      }

      if (normalized.includes("다음주") || normalized.includes("담주")) {
        const targetDate = cloneDate(today);
        targetDate.setDate(targetDate.getDate() + 7);
        return formatDateToYMD(targetDate);
      }

      if (normalized.includes("이번주") || normalized.includes("금주")) return formatDateToYMD(today);

      if (normalized.includes("지난달") || normalized.includes("저번달") || normalized.includes("전달")) {
        const targetDate = cloneDate(today);
        targetDate.setMonth(targetDate.getMonth() - 1);
        return formatDateToYMD(targetDate);
      }

      if (normalized.includes("다음달") || normalized.includes("내달")) {
        const targetDate = cloneDate(today);
        targetDate.setMonth(targetDate.getMonth() + 1);
        return formatDateToYMD(targetDate);
      }

      if (normalized.includes("이번달") || normalized.includes("금월")) return formatDateToYMD(today);

      const standaloneDurationDays = {
        "하루": 1, "하룻": 1, "이틀": 2, "사흘": 3, "나흘": 4,
        "닷새": 5, "닷세": 5, "엿새": 6, "엿세": 6, "이레": 7,
        "여드레": 8, "아흐레": 9, "열흘": 10, "일주일": 7,
        "한주": 7, "한주일": 7, "두주": 14, "두주일": 14,
        "보름": 15, "반달": 15
      };
      const standaloneDurationPattern = "일주일|한주일|두주일|열흘|아흐레|여드레|이틀|사흘|나흘|닷새|닷세|엿새|엿세|이레|하룻|하루|한주|두주|보름|반달";
      const standaloneDurationRegex = new RegExp(`(${standaloneDurationPattern})(전|이전|전날|후|뒤|이후)`);
      const standaloneDurationMatch = standaloneDurationRegex.exec(normalized);
      if (standaloneDurationMatch) {
        const days = standaloneDurationDays[standaloneDurationMatch[1]];
        const sign = standaloneDurationMatch[2].includes("전") || standaloneDurationMatch[2].includes("이전") ? -1 : 1;
        const targetDate = cloneDate(today);
        targetDate.setDate(targetDate.getDate() + sign * days);
        return formatDateToYMD(targetDate);
      }

      const numberPattern = "[0-9]+|하루|하룻|한|일|하나|첫|이틀|이|두|둘|사흘|삼|세|셋|나흘|사|네|넷|닷새|닷세|오|다섯|엿새|엿세|육|여섯|이레|칠|일곱|여드레|팔|여덟|아흐레|구|아홉|열흘|열|십|일주일|한주일|한주|두주일|두주|보름|반달";
      const relativeRegex = new RegExp(`(${numberPattern})(일|하루|날|주|주일|주간|달|개월|월|년|해)(전|이전|전날|후|뒤|이후)`);
      const relativeMatch = relativeRegex.exec(normalized);

      if (relativeMatch) {
        const amount = koreanNumberToValue(relativeMatch[1]);
        const unit = relativeMatch[2];
        const direction = relativeMatch[3];
        const targetDate = cloneDate(today);
        if (amount === null) return null;

        const sign = direction.includes("전") || direction.includes("이전") ? -1 : 1;
        if (unit === "일" || unit === "하루" || unit === "날") targetDate.setDate(targetDate.getDate() + sign * amount);
        else if (unit === "주" || unit === "주일" || unit === "주간") targetDate.setDate(targetDate.getDate() + sign * amount * 7);
        else if (unit === "달" || unit === "개월" || unit === "월") targetDate.setMonth(targetDate.getMonth() + sign * amount);
        else if (unit === "년" || unit === "해") targetDate.setFullYear(targetDate.getFullYear() + sign * amount);

        return formatDateToYMD(targetDate);
      }

      return null;
    }

    function extractMealType(question) {
      const normalized = normalizeText(question);
      if (normalized.includes("중식") || normalized.includes("점심") || normalized.includes("낮밥")) return "lunch";
      if (normalized.includes("석식") || normalized.includes("저녁") || normalized.includes("저녁밥")) return "dinner";
      return "all";
    }

    function isMealQuestion(question) {
      const normalized = normalizeText(question);
      const mealKeywords = ["식단", "메뉴", "밥", "중식", "점심", "석식", "저녁", "기숙사", "백학사", "식당"];
      return mealKeywords.some((keyword) => normalized.includes(keyword));
    }

    function findAcademicSchedules(question) {
      const normalizedQuestion = normalizeText(question);
      return academicSchedules.filter((schedule) => {
        const titleMatched = normalizedQuestion.includes(normalizeText(schedule.title));
        const keywordMatched = schedule.keywords.some((keyword) => {
          const normalizedKeyword = normalizeText(keyword);
          return normalizedQuestion.includes(normalizedKeyword) || normalizedKeyword.includes(normalizedQuestion);
        });
        return titleMatched || keywordMatched;
      });
    }

    function isDateInsideSchedule(targetDate, schedule) {
      const target = new Date(targetDate);
      const start = new Date(schedule.startDate);
      const end = schedule.endDate ? new Date(schedule.endDate) : new Date(schedule.startDate);
      return start <= target && target <= end;
    }

    function findAcademicSchedulesByDate(targetDate) {
      return academicSchedules.filter((schedule) => isDateInsideSchedule(targetDate, schedule));
    }

    function createAcademicResponse(question) {
      const targetDate = extractDateFromQuestion(question);
      let matchedSchedules = [];

      if (targetDate) {
        matchedSchedules = findAcademicSchedulesByDate(targetDate);
        if (matchedSchedules.length === 0) return `${formatYMDToKorean(targetDate)}에 해당하는 학사일정을 찾지 못했습니다.`;
      } else {
        matchedSchedules = findAcademicSchedules(question);
        if (matchedSchedules.length === 0) return "해당하는 학사일정을 찾지 못했습니다.";
      }

      let response = targetDate
        ? `${formatYMDToKorean(targetDate)} 학사일정은 다음과 같습니다.\n\n`
        : "찾으신 학사일정은 다음과 같습니다.\n\n";

      matchedSchedules.forEach((schedule, index) => {
        response += `${index + 1}. ${formatAcademicDate(schedule)}\n`;
        response += `- 일정: ${schedule.title}\n`;
        response += `- 안내: ${schedule.description}`;
        if (index !== matchedSchedules.length - 1) response += "\n\n";
      });
      return response;
    }

    function createMealResponse(question) {
      const targetDate = extractDateFromQuestion(question);
      const mealType = extractMealType(question);
      const finalDate = targetDate || formatDateToYMD(new Date());
      const meal = mealData.find((item) => item.date === finalDate);

      if (!meal) return NO_MEAL_TEXT;

      if (mealType === "lunch") {
        if (!meal.lunch || meal.lunch === NO_MEAL_TEXT) return NO_MEAL_TEXT;
        return `${formatYMDToKorean(finalDate)} 중식 메뉴입니다.\n- ${meal.lunch}`;
      }

      if (mealType === "dinner") {
        if (!meal.dinner || meal.dinner === NO_MEAL_TEXT) return NO_MEAL_TEXT;
        return `${formatYMDToKorean(finalDate)} 석식 메뉴입니다.\n- ${meal.dinner}`;
      }

      const lunchEmpty = !meal.lunch || meal.lunch === NO_MEAL_TEXT;
      const dinnerEmpty = !meal.dinner || meal.dinner === NO_MEAL_TEXT;
      if (lunchEmpty && dinnerEmpty) return NO_MEAL_TEXT;

      let response = `${formatYMDToKorean(finalDate)} 기숙사 식단입니다.\n\n`;
      response += `- 중식: ${lunchEmpty ? NO_MEAL_TEXT : meal.lunch}\n\n`;
      response += `- 석식: ${dinnerEmpty ? NO_MEAL_TEXT : meal.dinner}`;
      return response;
    }

    function createBotResponse(question) {
      if (isMealQuestion(question)) return createMealResponse(question);
      return createAcademicResponse(question);
    }

    function addMessage(sender, text) {
      const row = document.createElement("div");
      row.className = `message-row ${sender}`;
      const message = document.createElement("div");
      message.className = `message ${sender}`;
      message.textContent = text;
      row.appendChild(message);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function handleSendMessage() {
      const question = userInput.value.trim();
      if (question === "") {
        addMessage("bot", "질문을 입력해 주세요. 예: 어제 식단");
        return;
      }
      addMessage("user", question);
      userInput.value = "";
      addMessage("bot", createBotResponse(question));
    }

    sendButton.addEventListener("click", handleSendMessage);
    userInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") handleSendMessage();
    });
    guideChips.forEach((chip) => {
      chip.addEventListener("click", () => {
        userInput.value = chip.textContent;
        handleSendMessage();
      });
    });

    console.log("조선대 플러스+ 로드 완료. 식단 데이터:", mealData.length, "개");
  </script>
